name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -v -count=1 ./...

  build:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o basemake .

  build-all:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o basemake-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: basemake-${{ matrix.goos }}-${{ matrix.goarch }}
          path: basemake-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  docker:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/karabo-labs/basemake
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build-all]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create archive and checksums
        run: |
          mkdir -p release
          cd artifacts

          for dir in basemake-*; do
            os_arch="${dir#basemake-}"
            binary="basemake-${os_arch}"

            # Add .exe for Windows
            if echo "$os_arch" | grep -q "windows"; then
              binary="${binary}.exe"
            fi

            # Rename binary to just "basemake" (or "basemake.exe" for Windows) inside archive
            if echo "$os_arch" | grep -q "windows"; then
              cp "$dir/$binary" "../release/basemake.exe"
              tar czf "../release/basemake-${os_arch}.tar.gz" -C "../release" basemake.exe
              rm "../release/basemake.exe"
            else
              cp "$dir/$binary" "../release/basemake"
              tar czf "../release/basemake-${os_arch}.tar.gz" -C "../release" basemake
              rm "../release/basemake"
            fi
          done

          cd ../release
          sha256sum basemake-*.tar.gz > checksums.txt
          echo "=== Built artifacts ==="
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: |
            ## basemake ${{ github.ref_name }}

            ### Install

            ```bash
            # Linux amd64
            curl -sfL https://github.com/${{ github.repository }}/releases/latest/download/basemake-linux-amd64.tar.gz | tar xz
            sudo mv basemake /usr/local/bin/

            # macOS (Intel)
            curl -sfL https://github.com/${{ github.repository }}/releases/latest/download/basemake-darwin-amd64.tar.gz | tar xz
            sudo mv basemake /usr/local/bin/

            # macOS (Apple Silicon)
            curl -sfL https://github.com/${{ github.repository }}/releases/latest/download/basemake-darwin-arm64.tar.gz | tar xz
            sudo mv basemake /usr/local/bin/

            # Windows (via PowerShell)
            # curl.exe -LO https://github.com/${{ github.repository }}/releases/latest/download/basemake-windows-amd64.tar.gz
            ```
          files: release/*
          generate_release_notes: true
