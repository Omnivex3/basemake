# dbai golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

version: "2"
linters:
  default: standard
  disable:
    - depguard
  settings:
    gosec:
      excludes:
        - G115  # Integer overflow conversion (false positives in count variables)
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ^\.github/
      - ^\.git/
formatters:
  exclusions:
    generated: lax
    paths:
      - ^\.github/
      - ^\.git/
