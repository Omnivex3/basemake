# .goreleaser.yaml — matches the existing release.yml workflow
# See https://goreleaser.com
#
# Build matrix (mirrors release.yml):
#   linux   amd64, arm64
#   darwin  amd64, arm64
#   windows amd64        (windows/arm64 excluded)

version: 2

project_name: basemake

before:
  hooks:
    - go mod tidy

builds:
  - id: basemake
    main: .
    binary: basemake
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "basemake-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - tar.gz
    files:
      - none*
    # Ensure binary inside archive is just "basemake" (or "basemake.exe" on Windows)
    wrap_in_directory: false

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: DynamicKarabo
    name: basemake
  name_template: "{{ .Tag }}"
  prerelease: auto
  header: |
    ## basemake {{ .Tag }}

    ### Install

    ```bash
    # Linux amd64
    curl -sfL https://github.com/DynamicKarabo/basemake/releases/latest/download/basemake-linux-amd64.tar.gz | tar xz
    sudo mv basemake /usr/local/bin/

    # macOS (Intel)
    curl -sfL https://github.com/DynamicKarabo/basemake/releases/latest/download/basemake-darwin-amd64.tar.gz | tar xz
    sudo mv basemake /usr/local/bin/

    # macOS (Apple Silicon)
    curl -sfL https://github.com/DynamicKarabo/basemake/releases/latest/download/basemake-darwin-arm64.tar.gz | tar xz
    sudo mv basemake /usr/local/bin/

    # Windows (via PowerShell)
    # curl.exe -LO https://github.com/DynamicKarabo/basemake/releases/latest/download/basemake-windows-amd64.tar.gz
    ```

changelog:
  use: github
